version: 2
updates:
  # This repository uses one root package.json and lockfile.
  # Keep Dependabot at the root and group npm updates together so it does not
  # open a separate pull request for each dependency bump.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "dependabot"
    groups:
      workspace-dependencies:
        patterns:
          - "*"
